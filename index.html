<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <!-- Links to the external CSS file -->
    <link rel="stylesheet" href="styles.css">
    <!-- Links to the external JavaScript file -->
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- HEADER AND SUMMARY -->
        <header>
            <h1>Personal Expense Tracker 💰</h1>
            <div id="summary" class="summary-box">
                <div>
                    <h2>Total Spent:</h2>
                    <p id="total-spent">$0.00</p>
                </div>
                <div>
                    <h2>Expense Count:</h2>
                    <p id="expense-count">0</p>
                </div>
            </div>
        </header>

        <!-- ADD NEW EXPENSE FORM -->
        <section class="form-section">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" min="0.01" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value=""disabled selected >Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input type="text" id="description" name="description" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <button type="submit" class="add-btn">Add Expense</button>
            </form>
        </section>

        <!-- EXPENSE LIST AND FILTERING -->
        <section class="list-section">
            <h2>Expense History</h2>
            <div class="filter-controls">
                <label for="filter-category">Filter by Category:</label>
                <select id="filter-category">
                    <option value="all">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div id="expense-list-container">
                <!-- Expenses will be inserted here by JavaScript -->
                <p>Loading expenses...</p>
            </div>
        </section>
    </div>
</body>
</html>
